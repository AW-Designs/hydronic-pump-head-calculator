name: Release

# Push a tag like "v1.1.0" to build the Windows installer, sign the update
# artifact, and publish a GitHub Release with latest.json for the in-app updater.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The signing key was generated with an empty password. GitHub cannot
          # store a truly-empty secret, so we pass the empty password literally
          # here rather than via a secret (an empty password is not sensitive —
          # security rests on TAURI_SIGNING_PRIVATE_KEY staying secret).
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hydronic Pump Head Calculator ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
